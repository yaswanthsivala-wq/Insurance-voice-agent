services:
  - type: web
    name: insurance-voice-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false   # set in the Render dashboard
      - key: SUPABASE_URL
        sync: false   # set in the Render dashboard
      - key: SUPABASE_KEY
        sync: false   # SECRET key (sb_secret_...) — set in the Render dashboard
